app = 'family-house-manager'
primary_region = 'ams'

[build]

[env]
  NODE_ENV = 'production'
  DATABASE_URL = 'file:/data/family.db'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'family_data'
  destination = '/data'
