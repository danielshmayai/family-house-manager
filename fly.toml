# fly.toml app configuration file generated for family-house-manager on 2026-03-18T09:07:01+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'family-house-manager'
primary_region = 'ams'

[build]

[env]
  DATABASE_URL = 'file:/data/family.db'
  NODE_ENV = 'production'

[[mounts]]
  source = 'family_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
